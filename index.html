<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Caro</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

<!--MENU-->
<div id="menu-screen" class="screen">
    <div class="menu-card">
        <h1 class="title">
            <span>C</span>
            <span>a</span>
            <span>r</span>
            <span>o</span>
        </h1>

        <div class="menu-buttons">
            <button id="pvp-btn" class="btn pvp">2 Players</button>
            <button id="ai-btn" class="btn ai">Play vs AI</button>
        </div>
    </div>
</div>

<!--GAME-->
<div id="game-screen" class="screen" style="display: none;">
    <h1 class="title">
        <span>C</span>
        <span>a</span>
        <span>r</span>
        <span>o</span>
    </h1>

    <div class="game-container">
        <div class="top-bar">
            <button id="back-btn" class="btn back">← Back</button>

            <div class="player-turn" id="player-turn">
                Player <span id="player-icon"></span>
            </div>

            <button id="restart-btn" class="btn restart">⟳ Restart</button>
        </div>

        <table id="board"></table>
    </div>
</div>

<!-- WIN POPUP -->
<div id="popup" class="popup" style="display: none;">
    <div class="popup-content">
        <button id="popup-close" class="popup-close">✕</button>

        <!-- ❌ NÚT X -->
        <h2 id="popup-text">Winner</h2>

        <button id="popup-restart" class="btn restart">Play Again</button>
    </div>
</div>

<script type="module" src="source/js/main.js"></script>
</body>
</html>
